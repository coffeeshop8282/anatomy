<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedTerm Study</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --surface: #ede8dc;
  --surface2: #e4ddd0;
  --surface3: #d8d0c0;
  --border: #c8bfaa;
  --border2: #b0a690;
  --accent: #7c5c2e;
  --accent2: #c0392b;
  --accent3: #2e7c6e;
  --accent4: #8c6d2e;
  --text: #2a2218;
  --text-muted: #6a5c48;
  --text-dim: #9a8c78;
  --green: #2e7c5c;
  --red: #c0392b;
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  font-size: 15.4px;
  line-height: 1.5;
  font-weight: 500;
}

/* ── LANGUAGE BAR ── */
.lang-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.lang-label {
  font-size: 11px;
  color: var(--text-dim);
  margin-right: 4px;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.05em;
}
.lang-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.05em;
}
.lang-btn:hover { border-color: var(--accent); color: var(--text); }
.lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── HEADER ── */
header {
  padding: 20px 20px 0;
  max-width: 1100px;
  margin: 0 auto;
}
.header-inner {
  display: flex;
  align-items: flex-end;
  gap: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.app-title {
  font-family: 'Space Mono', monospace;
  font-size: clamp(22px, 4vw, 32px);
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.app-title span { color: var(--accent); }
.app-subtitle {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 3px;
  font-weight: 300;
}
.header-stats {
  margin-left: auto;
  display: flex;
  gap: 16px;
}
.hstat { text-align: right; }
.hstat-num {
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}
.hstat-lbl { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

/* ── CHAPTER TABS ── */
.chapter-tabs {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  margin-top: 16px;
  border-bottom: 1px solid var(--border);
}
.chapter-tabs::-webkit-scrollbar { display: none; }
.chapter-tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 14px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  margin-bottom: -1px;
}
.chapter-tab:hover { color: var(--text); }
.chapter-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── PANELS ── */
.panels { max-width: 1100px; margin: 0 auto; padding: 20px; }
.chapter-panel { display: none; }
.chapter-panel.visible { display: block; }

/* ── TERMS PANEL: CONTROLS ── */
.controls-row {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 180px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-dim); }
.filter-btn, .ch-filter-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.ch-filter-btn:hover, .ch-filter-btn.active { background: var(--accent3); border-color: var(--accent3); color: #fff; }

/* ── MODE BAR ── */
.mode-bar {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 18px;
}
.mode-label { font-size: 11px; color: var(--text-dim); font-family: 'Space Mono', monospace; margin-right: 2px; }
.mode-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn:hover { color: var(--text); border-color: var(--border2); }
.mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.autoplay-btn {
  background: var(--accent4);
  border: none;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
  letter-spacing: 0.02em;
}
.autoplay-btn:hover { opacity: 0.85; }
.autoplay-btn.playing { background: var(--red); }

.autoplay-bar {
  display: none;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 14px;
  font-size: 13px;
  font-weight: 600;
}
.autoplay-bar.visible { display: flex; }
.autoplay-current { flex: 1; color: var(--text); }
.autoplay-current .ap-ko { font-size: 15px; font-weight: 700; color: var(--accent); }
.autoplay-current .ap-en { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.autoplay-progress { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text-dim); }
.autoplay-stop {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s;
}
.autoplay-stop:hover { border-color: var(--red); color: var(--red); }

.panel-autoplay-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}

.autoplay-options-row {
  display: none;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.autoplay-options-row.visible { display: flex; }
.ap-opt-label { font-size: 11px; color: var(--text-dim); font-family: "Space Mono", monospace; margin-right: 4px; }
.ap-opt-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: "DM Sans", sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 11px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.12s;
}
.ap-opt-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.ap-label { font-size: 10px; color: var(--text-dim); font-family: "Space Mono", monospace; margin-bottom: 2px; letter-spacing: 0.04em; }

/* ── LIST VIEW ── */
.list-view { display: none; }
.list-view.visible { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
.term-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: border-color 0.15s, transform 0.12s;
  animation: fadeUp 0.25s ease both;
}
.term-card:hover { border-color: var(--border2); transform: translateY(-1px); }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
.type-tag {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  padding: 2px 7px;
  border-radius: 10px;
  flex-shrink: 0;
  margin-top: 2px;
}
.tag-combining { background: rgba(124,92,46,0.15); color: #7c5c2e; border: 1px solid rgba(124,92,46,0.35); }
.tag-suffix    { background: rgba(192,57,43,0.12); color: #a02820; border: 1px solid rgba(192,57,43,0.3); }
.tag-prefix    { background: rgba(46,124,110,0.12);  color: #2e7c6e; border: 1px solid rgba(46,124,110,0.3); }
.card-term { font-size: 18px; font-weight: 700; color: var(--text); font-family: 'Space Mono', monospace; }
.card-pronun { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.card-meaning { font-size: 13px; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
.card-examples { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.example-row {
  background: var(--surface2);
  border-radius: 6px;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ex-term { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent3); font-weight: 700; min-width: 80px; }
.ex-meaning { font-size: 12px; color: var(--text-muted); }
.speak-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 13px;
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
  flex-shrink: 0;
  margin-left: auto;
}
.speak-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── FLASHCARD ── */
.flashcard-view { display: none; }
.flashcard-view.visible { display: block; }
.fc-controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.fc-progress { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text-muted); }
.fc-progress-bar { flex: 1; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.fc-progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; border-radius: 2px; }
.fc-shuffle-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 11px;
  font-family: 'Space Mono', monospace;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.12s;
}
.fc-shuffle-btn:hover { border-color: var(--accent); color: var(--accent); }
.flashcard-stage {
  perspective: 1200px;
  height: 340px;
  cursor: pointer;
  margin-bottom: 16px;
}
.flashcard-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.flashcard-inner.flipped { transform: rotateY(180deg); }
.fc-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 16px;
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  text-align: center;
}
.fc-front { background: var(--surface); }
.fc-back { background: var(--surface2); transform: rotateY(180deg); }
.fc-type-tag { font-size: 11px; font-family: 'Space Mono', monospace; margin-bottom: 16px; padding: 4px 12px; border-radius: 12px; }
.fc-main-term { font-family: 'Space Mono', monospace; font-size: clamp(32px, 6vw, 52px); font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1; }
.fc-hint { font-size: 12px; color: var(--text-dim); }
.fc-answer-meaning { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
.fc-answer-pronun { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
.fc-examples { display: flex; flex-direction: column; gap: 6px; max-height: 120px; overflow-y: auto; width: 100%; }
.fc-ex-item { background: var(--surface); border-radius: 8px; padding: 6px 12px; text-align: left; }
.fc-ex-en { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent3); }
.fc-ex-ko { font-size: 11px; color: var(--text-muted); }
.fc-speak-area { margin-top: 16px; }
.fc-speak-big {
  background: var(--accent);
  border: none;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.fc-speak-big:hover { opacity: 0.85; }
.fc-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.fc-nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 18px;
  width: 44px; height: 44px;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.12s;
  display: flex; align-items: center; justify-content: center;
}
.fc-nav-btn:hover { background: var(--accent); border-color: var(--accent); }
.fc-flip-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 10px 20px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.12s;
}
.fc-flip-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── QUIZ ── */
.quiz-view { display: none; }
.quiz-view.visible { display: block; }
.quiz-score-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--text-muted);
}
.quiz-question-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 14px;
  text-align: center;
}
.quiz-q-label { font-size: 11px; color: var(--text-dim); font-family: 'Space Mono', monospace; margin-bottom: 12px; }
.quiz-q-term { font-family: 'Space Mono', monospace; font-size: clamp(24px, 5vw, 38px); font-weight: 700; color: var(--text); }
.quiz-q-type { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
.quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.quiz-option {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-align: left;
  transition: all 0.12s;
  line-height: 1.4;
}
.quiz-option:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,92,231,0.08); }
.quiz-option.correct { background: rgba(46,124,92,0.12); border-color: var(--green); color: var(--green); }
.quiz-option.wrong { background: rgba(192,57,43,0.12); border-color: var(--red); color: var(--red); }
.quiz-feedback { min-height: 30px; font-size: 13px; color: var(--text-muted); margin-bottom: 10px; text-align: center; }
.quiz-next-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 12px 28px;
  border-radius: 20px;
  cursor: pointer;
  display: block;
  margin: 0 auto;
  transition: opacity 0.15s;
  opacity: 0;
  pointer-events: none;
}
.quiz-next-btn.show { opacity: 1; pointer-events: all; }

/* ── ANATOMY FIGURES ── */
.figures-view { display: none; }
.figures-view.visible { display: block; }
.fig-cards-wrap { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 20px; }
.fig-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.15s;
}
.fig-card:hover { border-color: var(--border2); }
.fig-chapter-group { margin-bottom: 32px; }
.fig-chapter-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
}
.fig-ch-badge {
  background: var(--accent);
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 12px;
  flex-shrink: 0;
}
.fig-ch-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.fig-chapter-badge {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 5px 12px;
  letter-spacing: 0.03em;
}

.fig-diagram {
  width: 100%;
  background: #2a2218;
  border-bottom: 1px solid var(--border);
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fig-svg { width: 100%; height: auto; max-height: 340px; }
.fig-info { padding: 14px 16px; }
.fig-title { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.fig-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

/* ── PHOTO CARDS TAB ── */
.photos-panel {}
.photos-toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.photos-toolbar h3 { font-size: 13px; color: var(--text-muted); font-weight: 400; margin-right: auto; }
.upload-btn-label {
  background: var(--accent);
  border: none;
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 9px 18px;
  border-radius: 20px;
  cursor: pointer;
  transition: opacity 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.upload-btn-label:hover { opacity: 0.85; }
#photoFileInput { display: none; }
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.photo-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.25s ease both;
  transition: border-color 0.15s;
}
.photo-card:hover { border-color: var(--border2); }
.photo-card-img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: contain;
  display: block;
  background: var(--surface2);
  cursor: zoom-in;
}
.photo-card-body { padding: 12px 14px; }
.photo-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  outline: none;
  background: none;
  border: none;
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  cursor: text;
}
.photo-card-title[contenteditable]:focus {
  background: var(--surface2);
  border-radius: 4px;
  padding: 2px 6px;
  margin: -2px -6px;
}
.photo-card-notes {
  font-size: 12px;
  color: var(--text-muted);
  outline: none;
  background: none;
  border: none;
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  line-height: 1.5;
  cursor: text;
  min-height: 36px;
  resize: none;
}
.photo-card-notes[contenteditable]:focus {
  background: var(--surface2);
  border-radius: 4px;
  padding: 4px 6px;
}
.photo-card-footer {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 14px 10px;
  gap: 6px;
}
.photo-delete-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  transition: all 0.12s;
}
.photo-delete-btn:hover { border-color: var(--red); color: var(--red); }
.photo-empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.photo-empty .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.photo-empty p { font-size: 13px; line-height: 1.6; }

/* ── SPECIALIST PANEL ── */
.specialist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.specialist-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  animation: fadeUp 0.25s ease both;
}
.spec-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.spec-tag {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  padding: 3px 8px;
  border-radius: 10px;
  white-space: nowrap;
  margin-top: 3px;
}
.spec-tag-medical   { background: rgba(108,92,231,0.15); color: #a29bfe; border: 1px solid rgba(108,92,231,0.3); }
.spec-tag-surgical  { background: rgba(0,206,201,0.12); color: #00cec9; border: 1px solid rgba(0,206,201,0.3); }
.spec-tag-diagnostic{ background: rgba(253,203,110,0.12); color: #fdcb6e; border: 1px solid rgba(253,203,110,0.3); }
.spec-title { font-size: 16px; font-weight: 700; font-family: 'Space Mono', monospace; color: var(--text); }
.spec-ko { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.spec-pronun { font-size: 11px; color: var(--text-dim); }
.spec-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; line-height: 1.5; }
.spec-treats { display: flex; flex-wrap: wrap; gap: 5px; }
.spec-treat-tag {
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 3px 9px;
  border-radius: 10px;
}

/* ── WARD PANEL ── */
.ward-section { margin-bottom: 24px; }
.ward-section-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.ward-section-icon { font-size: 18px; }
.ward-section-title { font-size: 14px; font-weight: 700; color: var(--text); }
.ward-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
.ward-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  animation: fadeUp 0.2s ease both;
}
.ward-abbr { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent4); margin-bottom: 4px; }
.ward-en { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.ward-ko { font-size: 12px; color: var(--accent3); margin-bottom: 4px; }
.ward-es { font-size: 12px; color: var(--accent2); margin-bottom: 4px; display: none; }
.ward-desc { font-size: 11px; color: var(--text-dim); line-height: 1.4; }

/* ── DROP ZONE ── */
.photo-drop-zone {
  border: 2px dashed var(--border2);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  margin-bottom: 16px;
  transition: all 0.15s;
  cursor: pointer;
}
.photo-drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(108,92,231,0.08);
}
.drop-inner {
  font-size: 13px;
  color: var(--text-dim);
}

/* ── SCROLLBAR ── */
/* ── MUST KNOW ── */
.mk-category {
  border: 1px solid;
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 20px;
}
.mk-cat-title {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: 0.02em;
}
.mk-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 8px;
}
.mk-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  transition: border-color 0.12s;
}
.mk-card:hover { border-color: var(--border2); }
.mk-term {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
  line-height: 1.4;
}
.mk-note {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-bottom: 4px;
}
.mk-hint {
  font-size: 11px;
  color: var(--text-dim);
  font-style: italic;
}

/* ── PHOTO MODAL ── */
.photo-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.photo-modal-inner {
  position: relative;
  max-width: 95vw;
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.photo-modal-img {
  max-width: 95vw;
  max-height: 82vh;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.photo-modal-title {
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  max-width: 80vw;
}
.photo-modal-close {
  position: absolute;
  top: -14px;
  right: -14px;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.12s;
}
.photo-modal-close:hover { background: rgba(255,255,255,0.3); }
.photo-card-img {
  cursor: zoom-in;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

async function supaFetch(method, path, body) {
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  return method === 'DELETE' ? null : res.json();
}

// ============================================================
let photoCards = [];

async function loadPhotos() {
  try {
    showPhotoLoading(true);
    const data = await supaFetch('GET', 'medterm_photos?select=*&order=created_at.asc');
    photoCards = data || [];
    renderPhotoGrid();
  } catch(e) {
    console.error('loadPhotos error:', e);
    // Fallback to localStorage
    try { photoCards = JSON.parse(localStorage.getItem('medterm_photos') || '[]'); } catch(_) {}
    renderPhotoGrid();
  } finally {
    showPhotoLoading(false);
  }
}

async function savePhotoToSupabase(card) {
  try {
    const res = await supaFetch('POST', 'medterm_photos', {
      src: card.src,
      title: card.title || '',
      notes: card.notes || ''
    });
    return res[0];
  } catch(e) {
    console.error('savePhoto error:', e);
    return null;
  }
}

async function deletePhotoFromSupabase(id) {
  try {
    await supaFetch('DELETE', 'medterm_photos?id=eq.' + id);
  } catch(e) {
    console.error('deletePhoto error:', e);
  }
}

async function updatePhotoInSupabase(id, field, val) {
  try {
    await supaFetch('PATCH', 'medterm_photos?id=eq.' + id, { [field]: val });
  } catch(e) {
    console.error('updatePhoto error:', e);
  }
}

function showPhotoLoading(show) {
  const grid = document.getElementById('photoGrid');
  if (show) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);font-size:13px">불러오는 중...</div>';
  }
}

function updatePhotoStat() {
  document.getElementById('statPhotos').textContent = photoCards.length;
}

function renderPhotoGrid() {
  const grid = document.getElementById('photoGrid');
  if (!photoCards.length) {
    grid.innerHTML = `<div class="photo-empty">
      <div class="empty-icon">📷</div>
      <p>${t('photoEmpty')}<br><span style="color:var(--text-dim)">${t('photoEmptyDesc')}</span></p>
    </div>`;
    updatePhotoStat();
    return;
  }
  grid.innerHTML = photoCards.map((card, idx) => `
    <div class="photo-card" data-id="${card.id}" data-idx="${idx}">
      <img class="photo-card-img" src="${card.src}" alt="photo card" data-src="${card.src}" data-title="${(card.title||'사진')}">
      <div class="photo-card-body">
        <div class="photo-card-title" contenteditable="true"
          onblur="handlePhotoEdit(this, ${idx}, 'title')">${card.title || ''}</div>
        <div class="photo-card-notes" contenteditable="true"
          onblur="handlePhotoEdit(this, ${idx}, 'notes')">${card.notes || ''}</div>
      </div>
      <div class="photo-card-footer">
        <button class="photo-delete-btn" onclick="deletePhoto(${idx})">${t('deleteCard')}</button>
      </div>
    </div>
  `).join('');
  updatePhotoStat();
}

function handlePhotoEdit(el, idx, field) {
  const val = el.textContent.trim();
  if (!photoCards[idx]) return;
  photoCards[idx][field] = val;
  const id = photoCards[idx].id;
  if (id) updatePhotoInSupabase(id, field, val);
}

async function deletePhoto(idx) {
  const card = photoCards[idx];
  if (!card) return;
  photoCards.splice(idx, 1);
  renderPhotoGrid();
  if (card.id) await deletePhotoFromSupabase(card.id);
}

function processImageFiles(files) {
  if (!files.length) return;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = async ev => {
      const newCard = { src: ev.target.result, title: file.name.replace(/\.[^.]+$/, ''), notes: '', id: null };
      // Save to Supabase first to get id
      const saved = await savePhotoToSupabase(newCard);
      if (saved) newCard.id = saved.id;
      photoCards.push(newCard);
      renderPhotoGrid();
    };
    reader.readAsDataURL(file);
  });
}

// Photo grid click delegation for modal
document.getElementById('photoGrid').addEventListener('click', function(e) {
  const img = e.target.closest('.photo-card-img');
  if (img) openPhotoModal(img.dataset.src, img.dataset.title);
});

document.getElementById('photoFileInput').addEventListener('change', function(e) {
  processImageFiles(Array.from(e.target.files));
  this.value = '';
});

const dropZone = document.getElementById('photoDropZone');
dropZone.addEventListener('click', () => document.getElementById('photoFileInput').click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  processImageFiles(files);
});

let currentFilter = 'all';
let currentChapter = 'all';
let currentMode = 'list';
let fcDeck = [], fcIndex = 0, fcFlipped = false;
let quizScore = 0, quizTotal = 0, quizAnswered = false, quizCorrectIdx = -1;

function getFilteredData() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  return DATA.filter(d => {
    if (currentFilter !== 'all' && d.type !== currentFilter) return false;
    if (currentChapter !== 'all' && String(d.chapter) !== currentChapter) return false;
    if (!q) return true;
    return d.term.toLowerCase().includes(q)
      || d.ko.includes(q)
      || d.en.toLowerCase().includes(q)
      || (d.es && d.es.toLowerCase().includes(q))
      || d.examples.some(ex => ex.en.toLowerCase().includes(q) || ex.ko.includes(q));
  });
}

function getMeaningByLang(d) {
  if (LANG === 'en') return d.en;
  if (LANG === 'es') return d.es || d.en;
  return d.ko;
}

function renderList() {
  const data = getFilteredData();
  document.getElementById('statTerms').textContent = DATA.length;
  const view = document.getElementById('listView');
  if (!data.length) { view.innerHTML = '<div style="color:var(--text-dim);padding:40px;text-align:center">검색 결과 없음</div>'; return; }
  view.innerHTML = data.map((d, i) => {
    const tagClass = `tag-${d.type}`;
    const tagLabel = {combining:'결합형',suffix:'접미사',prefix:'접두사'}[d.type];
    const meaning = getMeaningByLang(d);
    const secMeaning = LANG === 'ko' ? d.en : d.ko;
    const exHtml = d.examples.map(ex => `
      <div class="example-row">
        <span class="ex-term">${ex.en}</span>
        <span class="ex-meaning">${ex.ko}${LANG==='es'&&ex.es?' / '+ex.es:''}</span>
        <button class="speak-btn" onclick="speak('${ex.en.replace(/'/g,"\\'")}')" title="발음 듣기">🔊</button>
      </div>`).join('');
    return `<div class="term-card" style="animation-delay:${(i%10)*25}ms">
      <div class="card-header">
        <span class="type-tag ${tagClass}">${tagLabel}</span>
        <div>
          <div class="card-term">${d.term}</div>
          <div class="card-pronun">${d.pronun}</div>
        </div>
        <button class="speak-btn" onclick="speak('${d.term.replace(/[/,]/g,' ').replace(/'/g,"\\'")}')" title="발음 듣기" style="margin-left:auto">🔊</button>
      </div>
      <div class="card-meaning">${meaning}<span style="color:var(--text-dim);font-size:12px;margin-left:8px">${secMeaning}</span></div>
      <div class="card-examples">${exHtml}</div>
    </div>`;
  }).join('');
}

function initFlashcard() {
  fcDeck = [...getFilteredData()];
  fcIndex = 0; fcFlipped = false;
  renderFlashcard();
}
function renderFlashcard() {
  if (!fcDeck.length) return;
  const d = fcDeck[fcIndex];
  const tagClass = `tag-${d.type}`;
  const tagLabel = {combining:'결합형',suffix:'접미사',prefix:'접두사'}[d.type];
  document.getElementById('fcTypeTag').className = `fc-type-tag ${tagClass}`;
  document.getElementById('fcTypeTag').textContent = tagLabel;
  document.getElementById('fcTypeTagBack').className = `fc-type-tag ${tagClass}`;
  document.getElementById('fcTypeTagBack').textContent = tagLabel;
  document.getElementById('fcTerm').textContent = d.term;
  document.getElementById('fcMeaning').textContent = getMeaningByLang(d);
  document.getElementById('fcPronun').textContent = d.pronun;
  document.getElementById('fcExamples').innerHTML = d.examples.map(ex =>
    `<div class="fc-ex-item"><div class="fc-ex-en">${ex.en}</div><div class="fc-ex-ko">${ex.ko}</div></div>`
  ).join('');
  const pct = fcDeck.length > 1 ? ((fcIndex/(fcDeck.length-1))*100) : 100;
  document.getElementById('fcProgress').textContent = `${fcIndex+1} / ${fcDeck.length}`;
  document.getElementById('fcProgressFill').style.width = pct + '%';
  document.getElementById('flashcardInner').classList.remove('flipped');
  fcFlipped = false;
}
function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('flashcardInner').classList.toggle('flipped', fcFlipped);
}

function renderQuiz() {
  const data = getFilteredData();
  if (data.length < 4) { document.getElementById('quizOptions').innerHTML = '<p style="color:var(--text-dim)">퀴즈를 위해 4개 이상의 용어가 필요합니다.</p>'; return; }
  const qIdx = Math.floor(Math.random()*data.length);
  const correct = data[qIdx];
  const wrongs = data.filter((_,i)=>i!==qIdx).sort(()=>Math.random()-0.5).slice(0,3);
  const options = [...wrongs, correct].sort(()=>Math.random()-0.5);
  quizCorrectIdx = options.indexOf(correct);
  quizAnswered = false;
  document.getElementById('quizTerm').textContent = correct.term;
  document.getElementById('quizType').textContent = `(${{combining:'결합형',suffix:'접미사',prefix:'접두사'}[correct.type]})`;
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizNextBtn').classList.remove('show');
  document.getElementById('quizOptions').innerHTML = options.map((o, i) => {
    const meaning = getMeaningByLang(o);
    return `<button class="quiz-option" data-idx="${i}" onclick="answerQuiz(${i},${quizCorrectIdx})">${i+1}. ${meaning}</button>`;
  }).join('');
}
function answerQuiz(chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true; quizTotal++;
  const opts = document.querySelectorAll('.quiz-option');
  opts[correct].classList.add('correct');
  if (chosen !== correct) {
    opts[chosen].classList.add('wrong');
    document.getElementById('quizFeedback').textContent = '오답!';
  } else {
    quizScore++;
    document.getElementById('quizFeedback').textContent = '정답! ✅';
  }
  opts.forEach(b => b.disabled = true);
  document.getElementById('quizScore').textContent = '✅ ' + quizScore;
  document.getElementById('quizTotal').textContent = quizTotal;
  document.getElementById('quizPercent').textContent = `정답률: ${Math.round((quizScore/quizTotal)*100)}%`;
  document.getElementById('quizNextBtn').classList.add('show');
}
document.getElementById('quizNextBtn').addEventListener('click', renderQuiz);

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

document.addEventListener('keydown', e => {
  if (currentMode==='flashcard') {
    if (e.key===' '||e.key==='ArrowUp') { e.preventDefault(); flipCard(); }
    if (e.key==='ArrowLeft' && fcIndex>0) { fcIndex--; renderFlashcard(); }
    if (e.key==='ArrowRight' && fcIndex<fcDeck.length-1) { fcIndex++; renderFlashcard(); }
  }
  if (currentMode==='quiz') {
    if (e.key==='Enter' && quizAnswered) renderQuiz();
    const n=parseInt(e.key);
    if (!quizAnswered && n>=1 && n<=4) {
      const o=document.querySelectorAll('.quiz-option');
      if(o[n-1]) o[n-1].click();
    }
  }
});

// AUTO PLAY
// ============================================================
let autoPlayActive = false;
let autoPlayQueue = [];   // flat list of utterance objects {ko, en, label}
let autoPlayIdx = 0;
let autoPlayTimer = null;
let apIncludeExamples = true;
let apShuffle = false;

// Option toggles
document.getElementById('apOptExamples').addEventListener('click', function() {
  apIncludeExamples = !apIncludeExamples;
  this.classList.toggle('active', apIncludeExamples);
});
document.getElementById('apOptShuffle').addEventListener('click', function() {
  apShuffle = !apShuffle;
  this.classList.toggle('active', apShuffle);
});

function buildQueue() {
  let deck = getFilteredData();
  if (apShuffle) deck = [...deck].sort(() => Math.random() - 0.5);

  const queue = [];
  deck.forEach(d => {
    // Main term: 한국어 뜻 → English term
    queue.push({ ko: d.ko, en: d.term.replace(/[\/\-,]/g, ' ').trim(), label: '단어' });
    // Examples: English word → Korean meaning
    if (apIncludeExamples && d.examples) {
      d.examples.forEach(ex => {
        queue.push({ ko: ex.ko, en: ex.en, label: '예시' });
      });
    }
  });
  return queue;
}

function startAutoPlay() {
  autoPlayQueue = buildQueue();
  if (!autoPlayQueue.length) return;
  autoPlayActive = true;
  autoPlayIdx = 0;
  document.getElementById('autoPlayBtn').textContent = '■ 중지';
  document.getElementById('autoPlayBtn').classList.add('playing');
  document.getElementById('autoPlayBar').classList.add('visible');
  document.getElementById('autoPlayOptionsRow').classList.add('visible');
  playNext();
}

function stopAutoPlay() {
  autoPlayActive = false;
  if (autoPlayTimer) clearTimeout(autoPlayTimer);
  window.speechSynthesis.cancel();
  document.getElementById('autoPlayBtn').textContent = '▶ 자동 읽기';
  document.getElementById('autoPlayBtn').classList.remove('playing');
  document.getElementById('autoPlayBar').classList.remove('visible');
  document.getElementById('autoPlayOptionsRow').classList.remove('visible');
  document.querySelectorAll('.term-card').forEach(c => c.style.outline = '');
}

function playNext() {
  if (!autoPlayActive || autoPlayIdx >= autoPlayQueue.length) {
    stopAutoPlay();
    return;
  }
  const item = autoPlayQueue[autoPlayIdx];
  document.getElementById('apLabel').textContent = item.label;
  document.getElementById('apKo').textContent = item.ko;
  document.getElementById('apEn').textContent = item.en;
  document.getElementById('apProgress').textContent = `${autoPlayIdx + 1} / ${autoPlayQueue.length}`;

  // Highlight card in list (only for 단어 items)
  if (item.label === '단어') {
    const cards = document.querySelectorAll('.term-card');
    // Find which card index this term matches
    const deck = getFilteredData();
    const termIdx = deck.findIndex(d => d.ko === item.ko);
    cards.forEach((c, i) => {
      c.style.outline = i === termIdx ? '2px solid var(--accent)' : '';
    });
    if (cards[termIdx]) cards[termIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  window.speechSynthesis.cancel();

  // Speak Korean first
  const u1 = new SpeechSynthesisUtterance(item.ko);
  u1.lang = 'ko-KR';
  u1.rate = 0.85;
  u1.onend = () => {
    if (!autoPlayActive) return;
    autoPlayTimer = setTimeout(() => {
      if (!autoPlayActive) return;
      // Speak English
      const u2 = new SpeechSynthesisUtterance(item.en);
      u2.lang = 'en-US';
      u2.rate = 0.82;
      u2.onend = () => {
        if (!autoPlayActive) return;
        const pause = item.label === '단어' ? 1000 : 600;
        autoPlayTimer = setTimeout(() => {
          autoPlayIdx++;
          playNext();
        }, pause);
      };
      window.speechSynthesis.speak(u2);
    }, 350);
  };
  window.speechSynthesis.speak(u1);
}

document.getElementById('autoPlayBtn').addEventListener('click', () => {
  if (autoPlayActive) stopAutoPlay();
  else startAutoPlay();
});
document.getElementById('autoPlayStop').addEventListener('click', stopAutoPlay);

// Show options row when hovering autoplay button area even before start
document.getElementById('autoPlayBtn').addEventListener('mouseenter', () => {
  if (!autoPlayActive) document.getElementById('autoPlayOptionsRow').classList.add('visible');
});

// Stop autoplay when switching modes/tabs
document.querySelectorAll('.mode-btn, .chapter-tab').forEach(btn => {
  btn.addEventListener('click', () => { if (autoPlayActive) stopAutoPlay(); });
});

function renderMustKnow() {
  const el = document.getElementById('mustKnowContent');
  // Use data-index approach to avoid inline string escaping issues
  let html = '';
  MUSTKNOW.forEach((cat, ci) => {
    html += `<div class="mk-category" style="border-color:${cat.border};background:${cat.color}">`;
    html += `<div class="mk-cat-title" style="color:${cat.accent}">${cat.category}</div>`;
    html += `<div class="mk-grid">`;
    cat.items.forEach((item, ii) => {
      html += `<div class="mk-card" data-ci="${ci}" data-ii="${ii}">`;
      html += `<div style="display:flex;align-items:flex-start;gap:6px">`;
      html += `<div style="flex:1">`;
      html += `<div class="mk-term" style="color:${cat.accent}">${item.term}</div>`;
      html += `<div class="mk-note">${item.note}</div>`;
      html += `<div class="mk-hint">💡 ${item.hint}</div>`;
      html += `</div>`;
      html += `<button class="speak-btn mk-speak-btn" data-ci="${ci}" data-ii="${ii}" title="읽기">🔊</button>`;
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });
  el.innerHTML = html;
  // Attach speak listeners using data attributes (safe, no inline escaping)
  el.querySelectorAll('.mk-speak-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const ci = parseInt(this.dataset.ci);
      const ii = parseInt(this.dataset.ii);
      const item = MUSTKNOW[ci].items[ii];
      speakMkItem(item.term, item.hint);
    });
  });
}

// ============================================================
// MUST KNOW AUTOPLAY
// ============================================================
let mkApActive = false, mkApIdx = 0, mkApTimer = null, mkApShuffle = false, mkApHint = true;

function speakMkItem(term, hint) {
  window.speechSynthesis.cancel();
  const hasKo = /[가-힣]/.test(term);
  const parts = term.split(/\s+/);
  const enParts = parts.filter(p => !/[가-힣]/.test(p)).join(' ').replace(/[()]/g, '').trim();
  const koParts = parts.filter(p => /[가-힣]/.test(p)).join(' ').trim();
  if (hasKo && koParts) {
    const u1 = new SpeechSynthesisUtterance(koParts);
    u1.lang = 'ko-KR'; u1.rate = 0.85;
    u1.onend = () => {
      if (!enParts) return;
      const u2 = new SpeechSynthesisUtterance(enParts);
      u2.lang = 'en-US'; u2.rate = 0.82;
      window.speechSynthesis.speak(u2);
    };
    window.speechSynthesis.speak(u1);
  } else {
    const u = new SpeechSynthesisUtterance(enParts || term);
    u.lang = 'en-US'; u.rate = 0.82;
    window.speechSynthesis.speak(u);
  }
}

document.getElementById('mkApOptHint').addEventListener('click', function() {
  mkApHint = !mkApHint;
  this.textContent = mkApHint ? '힌트 포함' : '힌트 제외';
  this.classList.toggle('active', mkApHint);
});
document.getElementById('mkApOptShuffle').addEventListener('click', function() {
  mkApShuffle = !mkApShuffle;
  this.textContent = mkApShuffle ? '셔플 켜짐' : '셔플 꺼짐';
  this.classList.toggle('active', mkApShuffle);
});

function buildMkQueue() {
  let allItems = [];
  MUSTKNOW.forEach(cat => {
    cat.items.forEach(item => {
      allItems.push({ term: item.term, note: item.note, hint: item.hint, accent: cat.accent });
    });
  });
  if (mkApShuffle) allItems = allItems.sort(() => Math.random() - 0.5);
  return allItems;
}

let mkApQueue = [];

function startMkAutoPlay() {
  mkApQueue = buildMkQueue();
  if (!mkApQueue.length) return;
  mkApActive = true; mkApIdx = 0;
  document.getElementById('mkAutoPlayBtn').textContent = '\u25a0 중지';
  document.getElementById('mkAutoPlayBtn').classList.add('playing');
  document.getElementById('mkAutoPlayBar').classList.add('visible');
  playMkNext();
}

function stopMkAutoPlay() {
  mkApActive = false;
  if (mkApTimer) clearTimeout(mkApTimer);
  window.speechSynthesis.cancel();
  document.getElementById('mkAutoPlayBtn').textContent = '\u25b6 자동 읽기';
  document.getElementById('mkAutoPlayBtn').classList.remove('playing');
  document.getElementById('mkAutoPlayBar').classList.remove('visible');
  document.querySelectorAll('.mk-card').forEach(c => c.style.outline = '');
}

function playMkNext() {
  if (!mkApActive || mkApIdx >= mkApQueue.length) { stopMkAutoPlay(); return; }
  const item = mkApQueue[mkApIdx];

  // Update status bar
  document.getElementById('mkApLabel').textContent = '필수암기';
  document.getElementById('mkApKo').textContent = item.term;
  document.getElementById('mkApEn').textContent = item.note.substring(0, 50) + (item.note.length > 50 ? '…' : '');
  document.getElementById('mkApProgress').textContent = `${mkApIdx + 1} / ${mkApQueue.length}`;

  // Highlight current card
  document.querySelectorAll('.mk-card').forEach((c, i) => {
    c.style.outline = i === mkApIdx ? '2px solid var(--accent)' : '';
  });
  const cards = document.querySelectorAll('.mk-card');
  if (cards[mkApIdx]) cards[mkApIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  window.speechSynthesis.cancel();

  // Parse term: separate Korean and English parts
  const termParts = item.term.split(/\s+/);
  const enTerm = termParts.filter(p => !/[가-힣]/.test(p)).join(' ').replace(/[()]/g,'').trim();
  const koTerm = termParts.filter(p => /[가-힣]/.test(p)).join(' ').trim();

  const utterances = [];

  // 1. Korean term if exists
  if (koTerm) {
    const u = new SpeechSynthesisUtterance(koTerm);
    u.lang = 'ko-KR'; u.rate = 0.85;
    utterances.push(u);
  }
  // 2. English term
  if (enTerm) {
    const u = new SpeechSynthesisUtterance(enTerm);
    u.lang = 'en-US'; u.rate = 0.82;
    utterances.push(u);
  }
  // 3. Hint (Korean) if enabled
  if (mkApHint && item.hint) {
    const hintText = item.hint.replace(/['"]/g, '');
    const u = new SpeechSynthesisUtterance(hintText);
    u.lang = /[가-힣]/.test(hintText) ? 'ko-KR' : 'en-US';
    u.rate = 0.8;
    utterances.push(u);
  }

  // Chain utterances
  function speakChain(idx) {
    if (!mkApActive || idx >= utterances.length) {
      if (!mkApActive) return;
      mkApTimer = setTimeout(() => { mkApIdx++; playMkNext(); }, 1000);
      return;
    }
    utterances[idx].onend = () => {
      if (!mkApActive) return;
      mkApTimer = setTimeout(() => speakChain(idx + 1), 300);
    };
    window.speechSynthesis.speak(utterances[idx]);
  }
  speakChain(0);
}

document.getElementById('mkAutoPlayBtn').addEventListener('click', () => {
  if (mkApActive) stopMkAutoPlay(); else startMkAutoPlay();
});
document.getElementById('mkAutoPlayStop').addEventListener('click', stopMkAutoPlay);

function openPhotoModal(src, title) {

  document.getElementById('photoModalTitle').textContent = title || '';

  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';

function closePhotoModal(e) {
  // Close if clicked on overlay (not inner content) or close button
  if (e && e.target !== document.getElementById('photoModal')) return;
  document.getElementById('photoModal').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('photoModal').style.display = 'none';
    document.body.style.overflow = '';
  }
});
